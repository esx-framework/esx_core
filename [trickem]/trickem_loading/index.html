<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrickEm City - Loading</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Lobster&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <div id="disco-bg">
        <div class="disco-ball"></div>
        <div class="light-rays"></div>
    </div>

    <div id="wrapper">
        <div id="logo-container">
            <h1 class="server-title">TrickEm City</h1>
            <p class="server-subtitle">E S T .&nbsp; 1 9 7 0</p>
        </div>

        <div id="tagline">
            <p>"The streets are groovy, the hustle is real"</p>
        </div>

        <div id="loading-bar-container">
            <div id="loading-bar">
                <div id="loading-bar-fill"></div>
            </div>
            <p id="loading-text">Stepping into the 70s<span class="dots"></span></p>
        </div>

        <div id="tips-container">
            <p id="tip-text"></p>
        </div>

        <div id="footer">
            <p>TrickEm City RP &bull; Disco &bull; Hustle &bull; Soul</p>
        </div>
    </div>

    <div class="vinyl-record"></div>

    <script src="js/main.js"></script>
</body>
</html>
