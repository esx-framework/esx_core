<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrickEm HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hud-container">
        <!-- Status bars (bottom-left) -->
        <div id="status-bars">
            <div class="status-bar" id="health-bar">
                <div class="bar-icon">&#10084;</div>
                <div class="bar-track">
                    <div class="bar-fill health-fill" id="health-fill"></div>
                </div>
            </div>
            <div class="status-bar" id="armor-bar">
                <div class="bar-icon">&#9881;</div>
                <div class="bar-track">
                    <div class="bar-fill armor-fill" id="armor-fill"></div>
                </div>
            </div>
        </div>

        <!-- Money display (top-right) -->
        <div id="money-display">
            <div class="money-row" id="cash-display">
                <span class="money-label">BREAD</span>
                <span class="money-value" id="cash-value">$0</span>
            </div>
            <div class="money-row" id="bank-display">
                <span class="money-label">STASH</span>
                <span class="money-value" id="bank-value">$0</span>
            </div>
        </div>

        <!-- Job info (top-left) -->
        <div id="job-display">
            <span class="job-label" id="job-name">Unemployed</span>
            <span class="job-grade" id="job-grade"></span>
        </div>

        <!-- Location / Time (bottom-right) -->
        <div id="location-display">
            <div class="location-time" id="time-display">12:00</div>
            <div class="location-street" id="street-display">Los Santos</div>
        </div>

        <!-- Vehicle speedometer (bottom-center, only in vehicle) -->
        <div id="vehicle-hud" class="hidden">
            <div class="speedo-container">
                <div class="speedo-value" id="speed-value">0</div>
                <div class="speedo-unit">MPH</div>
            </div>
            <div class="fuel-container">
                <div class="fuel-icon">&#9981;</div>
                <div class="fuel-track">
                    <div class="fuel-fill" id="fuel-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
